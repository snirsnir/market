<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הסופר של הטכנודע | לוח חי</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ── Reset & Base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --charcoal: #414042;
      --blue:     #29ABE2;
      --green:    #8DC63F;
      --purple:   #662D91;
      --orange:   #F7941D;
      --pink:     #EC008C;
      --red:      #BE1E2D;
      --yellow:   #f0d000;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Rubik', 'Segoe UI', Arial, sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #002266 0%, #001144 55%, #000a22 100%);
      color: #fff;
      transition: background 6s ease;
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    #header {
      flex: 0 0 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: linear-gradient(90deg, #cc5500 0%, #dd7700 22%, #0055bb 65%, #003388 100%);
      border-bottom: none;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      position: relative;
      z-index: 10;
      transition: background 5s ease;
    }

    #logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
    }

    #logo-area img {
      height: 40px;
      filter: brightness(0) invert(1);
      opacity: 0.9;
      flex-shrink: 0;
    }

    #title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 20px rgba(255,220,80,0.5);
      white-space: nowrap;
      animation: titlePulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 20px rgba(255,220,80,0.5); }
      50%       { text-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 36px rgba(255,180,0,0.9); }
    }

    #right-panel {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      justify-content: flex-end;
    }

    #clock {
      font-size: 1.05rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 3px;
      direction: ltr;
      font-variant-numeric: tabular-nums;
      min-width: 7ch;
      text-align: center;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      padding: 6px 14px;
      backdrop-filter: blur(6px);
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
      box-shadow: 0 2px 8px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    #connection-badge {
      font-size: 0.78rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(0,0,0,0.3);
      border: 1px solid transparent;
      transition: all 0.4s;
    }
    #connection-badge.connected {
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 8px rgba(141,198,63,0.4);
    }
    #connection-badge.disconnected {
      border-color: var(--red);
      color: var(--red);
      box-shadow: 0 0 8px rgba(190,30,45,0.4);
    }

    /* ── Grid ────────────────────────────────────────────────────── */
    #grid-wrapper {
      flex: 1;
      overflow: hidden;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    #cards-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      gap: 12px;
      /* columns/rows set dynamically by JS to fill screen */
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      transition: grid-template-columns 0.5s cubic-bezier(0.34, 1.2, 0.64, 1),
                  grid-template-rows    0.5s cubic-bezier(0.34, 1.2, 0.64, 1),
                  font-size             0.5s ease;
    }

    /* ── Empty State ─────────────────────────────────────────────── */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
    }
    #empty-state.visible { display: flex; }

    #empty-emoji {
      font-size: 100px;
      line-height: 1;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1);    opacity: 0.9; }
      50%       { transform: scale(1.08); opacity: 1;   }
    }

    #empty-text {
      font-size: 1.8rem;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
    }

    /* ── Session Card ────────────────────────────────────────────── */
    .session-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      min-height: 0;
      /* Cap card size so 1-2 sessions don't fill the entire 86" screen */
      max-width: 640px;
      max-height: 800px;
      width: 100%;
      margin: auto;           /* center in grid cell when smaller than cell */
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      animation: bubbleIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      position: relative;
      transition: box-shadow 0.4s;
      transform-origin: center center;
    }

    .card-ready {
      box-shadow: 0 0 0 4px #8DC63F, 0 8px 32px rgba(141,198,63,0.35), 0 2px 8px rgba(0,0,0,0.3);
      animation: bubbleIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both, pulseGreen 2.5s ease-in-out 0.7s infinite;
    }
    @keyframes pulseGreen {
      0%, 100% { box-shadow: 0 0 0 4px #8DC63F, 0 8px 32px rgba(141,198,63,0.35), 0 2px 8px rgba(0,0,0,0.3); }
      50%       { box-shadow: 0 0 0 6px #8DC63F, 0 8px 40px rgba(141,198,63,0.55), 0 2px 8px rgba(0,0,0,0.3); }
    }

    /* Pop in — elastic bubble */
    @keyframes bubbleIn {
      0%   { opacity: 0; transform: scale(0.15); filter: blur(6px); }
      55%  { opacity: 1; transform: scale(1.08); filter: blur(0); }
      75%  { transform: scale(0.96); }
      90%  { transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Pop out — deflate & shrink */
    .session-card.bubble-out {
      animation: bubbleOut 0.45s cubic-bezier(0.4, 0, 0.8, 0.6) forwards !important;
      pointer-events: none;
    }
    @keyframes bubbleOut {
      0%   { opacity: 1; transform: scale(1);    filter: blur(0);   }
      20%  { opacity: 1; transform: scale(1.06); filter: blur(0);   }
      100% { opacity: 0; transform: scale(0.1);  filter: blur(8px); }
    }


    /* ── Card Header ─────────────────────────────────────────────── */
    .card-header {
      padding: 0.85em 1em 0.75em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 12px 12px 0 0;
      flex-shrink: 0;
    }
    .card-header.status-shopping  { background: linear-gradient(135deg, #29ABE2, #1a7eb0); }
    .card-header.status-analyzing { background: linear-gradient(135deg, #F7941D, #d4650a); }
    .card-header.status-done      { background: linear-gradient(135deg, #8DC63F, #5a9e2f); }
    .card-header.status-default   { background: linear-gradient(135deg, #414042, #2a2a2a); }

    .card-name {
      font-size: 1.5em;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .status-badge {
      font-size: 0.72em;
      font-weight: 800;
      padding: 0.25em 0.6em;
      border-radius: 20px;
      background: rgba(255,255,255,0.25);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Card Body ───────────────────────────────────────────────── */
    .card-body {
      flex: 1;
      min-height: 0;
      padding: 0.75em 1em;
      display: flex;
      flex-direction: column;
      gap: 0.55em;
      background: #fff;
      border-radius: 0 0 12px 12px;
      overflow: hidden;
    }

    /* Progress bar */
    .progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.25em;
      flex-shrink: 0;
    }
    .progress-label {
      font-size: 0.8em;
      font-weight: 700;
      color: #555;
    }
    .progress-track {
      height: 0.6em;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease, background 0.5s ease;
    }
    .progress-fill.level-low  { background: linear-gradient(90deg, var(--orange), #ffb347); }
    .progress-fill.level-mid  { background: linear-gradient(90deg, var(--yellow), #a8c600); }
    .progress-fill.level-full { background: linear-gradient(90deg, var(--green), #5aae2a); }

    /* Nutrient icons */
    .nutrient-row {
      display: flex;
      gap: 0.6em;
      align-items: center;
      flex-shrink: 0;
    }
    .nutrient-icon {
      font-size: 1.4em;
      transition: opacity 0.3s, transform 0.3s;
      cursor: default;
      position: relative;
    }
    .nutrient-icon.active  { opacity: 1; transform: scale(1.1); }
    .nutrient-icon.inactive { opacity: 0.2; filter: grayscale(0.6); }
    .nutrient-icon .tooltip {
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: #fff;
      font-size: 0.65em;
      padding: 3px 7px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .nutrient-icon:hover .tooltip { opacity: 1; }

    /* Items grid */
    .items-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35em;
      padding: 0.2em 0;
      overflow: hidden;
    }
    .item-thumb {
      width: 3em; height: 3em;
      border-radius: 10px;
      background: #f0f2f5;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6em;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border: 1.5px solid rgba(255,255,255,0.6);
    }
    .item-thumb img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .more-items {
      width: 3em; height: 3em;
      border-radius: 10px;
      background: rgba(0,0,0,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75em; font-weight: 700; color: #555;
    }

    /* ── Celebration overlay ──────────────────────────────────────── */
    .celebration-content {
      flex: 1;
      min-height: 0;
      padding: 0.6em 1em 0.85em;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4em;
      background: linear-gradient(180deg, rgba(141,198,63,0.08), rgba(41,171,226,0.06));
      border-radius: 0 0 12px 12px;
      overflow: hidden;
    }

    .ai-title {
      font-size: 1.4em;
      font-weight: 900;
      text-align: center;
      color: var(--purple);
      letter-spacing: 0.03em;
    }

    .star-row {
      font-size: 1.4em;
      letter-spacing: 0.1em;
    }


    /* ── Responsive tweaks ──────────────────────────────────────── */
    @media (max-width: 600px) {
      #title { font-size: 1rem; }
      #header { padding: 0 12px; }
    }

    /* Nutrient gauge */
    .nutrient-gauge-wrap { display: flex; flex-direction: column; gap: 0.3em; flex-shrink: 0; }
    .ng-row { display: flex; align-items: center; gap: 0.4em; }
    .ng-icon { font-size: 0.88em; width: 1.3em; flex-shrink: 0; text-align: center; }
    .ng-track { flex: 1; height: 0.5em; background: #e8e8e8; border-radius: 8px; overflow: hidden; }
    .ng-fill { height: 100%; border-radius: 8px; min-width: 3px; transition: width 0.5s ease; }
    .ng-value { font-size: 0.7em; font-weight: 700; color: #666; width: 1.8em; text-align: left; flex-shrink: 0; }
  </style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div id="header">
    <div id="logo-area">
      <img src="technoda.png" alt="Technoda" />
      <div id="connection-badge" class="disconnected">🔴 אין חיבור</div>
    </div>

    <div id="title">🔬 הסופר של הטכנודע | לוח חי</div>

    <div id="right-panel">
      <div id="clock">00:00:00</div>
    </div>
  </div>

  <!-- Grid -->
  <div id="grid-wrapper">
    <div id="cards-grid"></div>
    <div id="empty-state">
      <div id="empty-emoji">🛒</div>
      <div id="empty-text">ממתין למבקרים...</div>
    </div>
  </div>
</div>


<script>
  /* ═══════════════════════════════════════════════════════════════
     Firebase init
  ═══════════════════════════════════════════════════════════════ */
  const firebaseConfig = {
    apiKey: "AIzaSyDNy5LNznYZv-8zDjjqoOhOMNDzHmVaVnc",
    authDomain: "market-ddfe6.firebaseapp.com",
    projectId: "market-ddfe6",
    storageBucket: "market-ddfe6.firebasestorage.app",
    messagingSenderId: "206448884373",
    appId: "1:206448884373:web:5193af078826df8e15f99c",
    databaseURL: "https://market-ddfe6-default-rtdb.europe-west1.firebasedatabase.app/"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  /* ═══════════════════════════════════════════════════════════════
     Avatars
  ═══════════════════════════════════════════════════════════════ */
  const DICEBEAR = 'https://api.dicebear.com/10.x/bottts/svg?seed=';
  const AVATARS = [
    { id:'spark',   name:'ספארק',  hex:'29ABE2', seed:'spark'    },
    { id:'nova',    name:'נובה',   hex:'F7941D', seed:'nova'     },
    { id:'zap',     name:'זאפ',    hex:'8DC63F', seed:'zap'      },
    { id:'bolt',    name:'בולט',   hex:'7B2FBE', seed:'bolt'     },
    { id:'pixel',   name:'פיקסל',  hex:'BE1E2D', seed:'pixel'    },
    { id:'chip',    name:"צ'יפ",   hex:'C8A200', seed:'chip'     },
    { id:'byte',    name:'בייט',   hex:'EC008C', seed:'byte'     },
    { id:'qubit',   name:'קוביט',  hex:'00A3C4', seed:'qubit'    },
    { id:'laser',   name:'לייזר',  hex:'5C3D2E', seed:'laser'    },
    { id:'comet',   name:'קומט',   hex:'1A7A6E', seed:'comet'    },
    { id:'proton',  name:'פרוטון', hex:'D44000', seed:'proton'   },
    { id:'atom',    name:'אטום',   hex:'3949AB', seed:'atom'     },
  ];
  function avatarUrl(av) {
    return DICEBEAR + av.seed + '&backgroundColor=' + av.hex;
  }

  const THEMES = [
    { id:'ocean',  name:'גלים',   emoji:'🌊', c1:'#0066cc', c2:'#29ABE2' },
    { id:'sunset', name:'שקיעה',  emoji:'🌅', c1:'#FF4500', c2:'#F7941D' },
    { id:'forest', name:'יער',    emoji:'🌿', c1:'#2d7a2d', c2:'#8DC63F' },
    { id:'galaxy', name:'גלקסיה',emoji:'🌌', c1:'#5500cc', c2:'#aa44ff' },
    { id:'berry',  name:'תות',    emoji:'🍓', c1:'#cc0055', c2:'#ff3388' },
  ];

  /* ═══════════════════════════════════════════════════════════════
     Connection state
  ═══════════════════════════════════════════════════════════════ */
  const badge = document.getElementById('connection-badge');
  db.ref('.info/connected').on('value', snap => {
    const connected = snap.val() === true;
    badge.textContent  = connected ? '🟢 מחובר' : '🔴 אין חיבור';
    badge.className    = 'connection-badge ' + (connected ? 'connected' : 'disconnected');
    // re-attach to id as well (id-based styling kept above)
    badge.id           = 'connection-badge';
  });

  /* ═══════════════════════════════════════════════════════════════
     Clock
  ═══════════════════════════════════════════════════════════════ */
  function updateClock() {
    const now = new Date();
    const hh  = String(now.getHours()).padStart(2, '0');
    const mm  = String(now.getMinutes()).padStart(2, '0');
    const ss  = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  /* ═══════════════════════════════════════════════════════════════
     Background palette cycling — smooth dark color transitions
  ═══════════════════════════════════════════════════════════════ */
  const BG_PALETTES = [
    // Deep ocean blue (start/default)
    { pos:'50% 0%',  bg:['#002266','#001144','#000a22'], hdr:['#cc5500','#dd7700','#0055bb','#003388'] },
    // Amethyst night
    { pos:'30% 8%',  bg:['#1f0044','#100028','#060011'], hdr:['#6600bb','#4d0099','#290055','#110022'] },
    // Arctic teal
    { pos:'70% 5%',  bg:['#002233','#001422','#00060d'], hdr:['#006688','#004d66','#003344','#001122'] },
    // Forest deep
    { pos:'20% 12%', bg:['#0c2200','#071400','#030800'], hdr:['#2a6600','#1e4d00','#113300','#071a00'] },
    // Ruby dusk
    { pos:'80% 0%',  bg:['#200008','#130004','#060002'], hdr:['#990022','#660011','#33000b','#1a0006'] },
    // Sapphire deep
    { pos:'50% 10%', bg:['#001344','#000b2e','#00050f'], hdr:['#0033aa','#002288','#001166','#000844'] },
    // Royal indigo
    { pos:'60% 6%',  bg:['#0c0033','#080020','#030010'], hdr:['#3d00aa','#2a0088','#180055','#0c0033'] },
    // Jade night
    { pos:'40% 3%',  bg:['#001f1a','#001210','#000608'], hdr:['#006644','#004433','#002222','#001111'] },
    // Copper dusk
    { pos:'55% 8%',  bg:['#1a0e00','#110800','#060300'], hdr:['#993300','#772200','#441100','#221000'] },
    // Midnight violet
    { pos:'35% 0%',  bg:['#110033','#0a0022','#040011'], hdr:['#550099','#3d0077','#220044','#110022'] },
  ];

  (function initPaletteCycle() {
    const header = document.getElementById('header');
    // Shuffle order (but keep index 0 first since it matches CSS default)
    const order = [0, ...BG_PALETTES.slice(1).map((_, i) => i + 1).sort(() => Math.random() - 0.5)];
    let step = 0;

    function applyPalette(idx, animate) {
      const p = BG_PALETTES[idx];
      const bgVal = `radial-gradient(ellipse at ${p.pos}, ${p.bg[0]} 0%, ${p.bg[1]} 55%, ${p.bg[2]} 100%)`;
      const hdrVal = `linear-gradient(90deg, ${p.hdr[0]} 0%, ${p.hdr[1]} 22%, ${p.hdr[2]} 65%, ${p.hdr[3]} 100%)`;
      if (!animate) {
        document.body.style.transition = 'none';
        header.style.transition = 'none';
      }
      document.body.style.background = bgVal;
      header.style.background = hdrVal;
      if (!animate) {
        requestAnimationFrame(() => requestAnimationFrame(() => {
          document.body.style.transition = '';
          header.style.transition = '';
        }));
      }
    }

    // Apply first palette instantly (matches CSS defaults)
    applyPalette(order[0], false);

    // Then cycle every 20 seconds with smooth transition
    setInterval(function() {
      step = (step + 1) % order.length;
      if (step === 0) {
        // Reshuffle when we complete a full cycle
        for (let i = order.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [order[i], order[j]] = [order[j], order[i]];
        }
      }
      applyPalette(order[step], true);
    }, 20000);
  })();

  /* ═══════════════════════════════════════════════════════════════
     Celebration tracker  { sessionId → timestamp first seen done }
  ═══════════════════════════════════════════════════════════════ */
  const DONE_SHOW_MS = 5 * 60 * 1000; // 5 minutes visible after finishing
  const FADE_MS      = 30_000;         // 30s fade after send/restart

  /* ═══════════════════════════════════════════════════════════════
     Helpers
  ═══════════════════════════════════════════════════════════════ */
  const ITEM_LIMIT = 10;

  const statusLabel = { shopping: '🛍️ קונה', analyzing: '🔬 מנתח', done: '✅ סיים' };
  const statusClass = { shopping: 'status-shopping', analyzing: 'status-analyzing', done: 'status-done' };

  function nutrientActive(items, key) {
    if (!items || !items.length) return false;
    return items.some(item => item && Number(item[key]) > 0);
  }

  function progressInfo(count) {
    const total = 10;
    const pct   = Math.min(count / total, 1) * 100;
    if (count >= total) return { pct, cls: 'level-full', label: '🌟 הסל מלא!' };
    if (count >= 7)     return { pct, cls: 'level-mid',  label: '⚡ כמעט מוכן!' };
    return { pct, cls: 'level-low', label: `${count} מוצרים` };
  }

  function starsFromRating(rating) {
    const r = Math.round(Number(rating) || 0);
    return '⭐'.repeat(Math.max(0, Math.min(r, 5)));
  }

  /* 1-second ticker — fades cards after send/restart, removes after 5 min */
  setInterval(function() {
    const now = Date.now();
    grid.querySelectorAll('.session-card').forEach(function(el) {
      if (el.dataset.status !== 'done') return;

      // Fade out over 30s when reportDoneAt is set
      const reportDoneAt = Number(el.dataset.reportDoneAt) || 0;
      if (reportDoneAt) {
        const elapsed  = now - reportDoneAt;
        const progress = Math.min(1, elapsed / FADE_MS);
        el.style.opacity   = Math.max(0, 1 - progress).toFixed(3);
        el.style.transform = 'scale(' + (1 - progress * 0.15).toFixed(3) + ')';
        if (progress >= 1 && !el.classList.contains('bubble-out')) {
          el.classList.add('bubble-out');
          setTimeout(function() { el.remove(); updateGridLayout(); }, 460);
        }
        return;
      }

      // Auto-remove after 5 min from finishedAt
      const finishedAt = Number(el.dataset.finishedAt) || 0;
      if (finishedAt && (now - finishedAt) >= DONE_SHOW_MS) {
        if (!el.classList.contains('bubble-out')) {
          el.classList.add('bubble-out');
          setTimeout(function() { el.remove(); updateGridLayout(); }, 460);
        }
      }
    });
  }, 1000);

  /* ═══════════════════════════════════════════════════════════════
     Build one card element
  ═══════════════════════════════════════════════════════════════ */
  function buildCard(sessionId, session) {
    const items     = session.items   ? Object.values(session.items) : [];
    const status    = session.status  || 'shopping';
    const name      = session.childName || session.name || 'מבקר';
    const aiTitle   = session.aiTitle   || '';
    const starRating = session.starRating != null ? session.starRating : null;
    const card = document.createElement('div');
    const isReportDone = status === 'done' && !!session.reportDoneAt;
    card.className   = 'session-card' + (status === 'done' && !isReportDone ? ' card-ready' : '');
    card.dataset.sid          = sessionId;
    card.dataset.status       = status;
    card.dataset.finishedAt   = session.finishedAt   || 0;
    card.dataset.reportDoneAt = session.reportDoneAt || 0;

    /* ── header ── */
    const header = document.createElement('div');
    const themeObj = THEMES.find(function(t) { return t.id === session.theme; });
    header.className = 'card-header';
    if (themeObj) {
      header.style.background = 'linear-gradient(135deg, ' + themeObj.c1 + ', ' + themeObj.c2 + ')';
    } else {
      header.classList.add(statusClass[status] || 'status-default');
    }

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.textContent = name;

    const badgeEl = document.createElement('div');
    badgeEl.className = 'status-badge';
    badgeEl.textContent = statusLabel[status] || status;

    // Avatar in header
    const av = AVATARS.find(function(a) { return a.id === session.avatar; });
    const headerLeft = document.createElement('div');
    headerLeft.style.cssText = 'display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden;';
    if (av) {
      const avWrap = document.createElement('span');
      avWrap.style.cssText = 'width:2.5em;height:2.5em;border-radius:50%;overflow:hidden;flex-shrink:0;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));';
      const avImg = document.createElement('img');
      avImg.src = avatarUrl(av);
      avImg.style.cssText = 'width:100%;height:100%;display:block;border-radius:50%;';
      avImg.alt = av.name;
      avWrap.appendChild(avImg);
      headerLeft.appendChild(avWrap);
    }
    headerLeft.appendChild(nameEl);
    header.appendChild(headerLeft);
    header.appendChild(badgeEl);
    card.appendChild(header);

    /* ── body ── */
    const body = document.createElement('div');
    body.className = 'card-body';

    body.appendChild(buildProgressSection(items, status));
    body.appendChild(buildNutrientGauge(items));
    body.appendChild(buildItemsList(items));

    if (status === 'done' && aiTitle) {
      const titleEl = document.createElement('div');
      titleEl.style.cssText = 'font-size:0.9rem;font-weight:800;color:#662D91;text-align:center;margin-top:4px;';
      titleEl.textContent = aiTitle;
      body.appendChild(titleEl);
    }

    card.appendChild(body);
    return card;
  }

  function buildProgressSection(items, status) {
    const count = items.length;
    const info  = status === 'done'
      ? { pct: 100, cls: 'level-full', label: '✅ הסל מוכן!' }
      : progressInfo(count);

    const wrap  = document.createElement('div');
    wrap.className = 'progress-wrap';

    const label = document.createElement('div');
    label.className   = 'progress-label';
    label.textContent = info.label;

    const track = document.createElement('div');
    track.className = 'progress-track';

    const fill  = document.createElement('div');
    fill.className = 'progress-fill ' + info.cls;
    fill.style.width = info.pct + '%';

    track.appendChild(fill);
    wrap.appendChild(label);
    wrap.appendChild(track);
    return wrap;
  }

  function buildNutrientGauge(items) {
    var carbs = 0, protein = 0, fat = 0;
    items.forEach(function(item) {
      carbs   += Number(item.carbs   || 0);
      protein += Number(item.protein || 0);
      fat     += Number(item.fat     || 0);
    });

    var kcalCarbs   = carbs   * 4;
    var kcalProtein = protein * 4;
    var kcalFat     = fat     * 9;
    var totalKcal   = kcalCarbs + kcalProtein + kcalFat || 1;

    var nutrients = [
      { label: 'פחמימות', emoji: '🌾', kcal: kcalCarbs,   color: '#F7941D' },
      { label: 'חלבונים', emoji: '💪', kcal: kcalProtein, color: '#29ABE2' },
      { label: 'שומנים',  emoji: '🥑', kcal: kcalFat,     color: '#8DC63F' },
    ];

    var wrap = document.createElement('div');
    wrap.className = 'nutrient-gauge-wrap';

    nutrients.forEach(function(n) {
      var pct = Math.round(n.kcal / totalKcal * 100);

      var row = document.createElement('div');
      row.className = 'ng-row';

      var icon = document.createElement('span');
      icon.className = 'ng-icon';
      icon.textContent = n.emoji;

      var track = document.createElement('div');
      track.className = 'ng-track';

      var fill = document.createElement('div');
      fill.className = 'ng-fill';
      fill.style.width = pct + '%';
      fill.style.background = n.color;
      fill.title = n.label + ': ' + pct + '%';

      var valEl = document.createElement('span');
      valEl.className = 'ng-value';
      valEl.textContent = pct + '%';

      track.appendChild(fill);
      row.appendChild(icon);
      row.appendChild(track);
      row.appendChild(valEl);
      wrap.appendChild(row);
    });

    return wrap;
  }

  function buildItemsList(items) {
    const wrap = document.createElement('div');
    wrap.className = 'items-grid';

    const visible = items.slice(0, ITEM_LIMIT);
    visible.forEach(item => {
      const thumb = document.createElement('div');
      thumb.className = 'item-thumb';
      thumb.title = item.name || '';

      if (item.image) {
        const img = document.createElement('img');
        img.src = item.image;
        img.alt = item.name || '';
        thumb.appendChild(img);
      } else {
        thumb.textContent = item.emoji || '🛒';
      }

      wrap.appendChild(thumb);
    });

    if (items.length > ITEM_LIMIT) {
      const more = document.createElement('div');
      more.className   = 'more-items';
      more.textContent = `+${items.length - ITEM_LIMIT}`;
      wrap.appendChild(more);
    }

    return wrap;
  }

  /* ═══════════════════════════════════════════════════════════════
     Full-screen grid layout — fits all cards without scrolling
  ═══════════════════════════════════════════════════════════════ */
  function calcGridCols(n) {
    if (n <= 0) return 1;
    const availW = window.innerWidth  - 32;  // minus 2×16px padding
    const availH = window.innerHeight - 64 - 32; // minus header + 2×16px padding
    let best = { cols: 1, score: Infinity };
    for (let c = 1; c <= n; c++) {
      const r     = Math.ceil(n / c);
      const cardW = availW / c;
      const cardH = availH / r;
      const ratio = cardW / cardH;
      // Target portrait cards (ratio ~0.65); penalise wasted cells lightly
      const score = Math.abs(ratio - 0.65) + (c * r - n) * 0.04;
      if (score < best.score) best = { cols: c, score };
    }
    return best.cols;
  }

  function updateGridLayout() {
    const n    = grid.querySelectorAll('.session-card').length;
    const cols = n > 0 ? calcGridCols(n) : 1;
    const rows = n > 0 ? Math.ceil(n / cols) : 1;
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;

    // Scale card content: font-size drives all em units inside cards
    const gap    = 12;
    const availW = window.innerWidth  - 32;
    const availH = window.innerHeight - 64 - 32;
    const cardW  = (availW - gap * (cols - 1)) / cols;
    const cardH  = (availH - gap * (rows - 1)) / rows;
    // Clamp to card's actual max-size so font doesn't overscale on large screens
    const effectiveW = Math.min(cardW, 640);
    const effectiveH = Math.min(cardH, 800);
    // Reference card: 400px wide × 500px tall → 16px base font
    const scale  = Math.min(effectiveW / 400, effectiveH / 500);
    const fs     = Math.max(10, Math.min(20, Math.round(16 * scale)));
    grid.style.fontSize = fs + 'px';
  }

  window.addEventListener('resize', updateGridLayout);

  /* ═══════════════════════════════════════════════════════════════
     Re-render all cards
  ═══════════════════════════════════════════════════════════════ */
  const grid       = document.getElementById('cards-grid');
  const emptyState = document.getElementById('empty-state');

  let knownIds      = new Set();
  let prevStatus    = {};
  const bubblingOut = new Set(); // IDs currently playing bubble-out animation

  function renderSessions(sessions) {
    const now       = Date.now();
    const fourHours = 4 * 60 * 60 * 1000;

    /* filter: active only */
    const active = Object.entries(sessions).filter(([id, s]) => {
      const created = s.createdAt || s.startTime || s.timestamp || 0;
      if ((now - created) >= fourHours) return false;
      if (s.status === 'done') {
        if (s.reportDoneAt) return (now - s.reportDoneAt) < FADE_MS; // keep during 30s fade
        const finishedAt = s.finishedAt || 0;
        if (finishedAt && (now - finishedAt) >= DONE_SHOW_MS) return false; // 5 min elapsed
        return true;
      }
      return true;
    });

    active.forEach(([id, s]) => {
      prevStatus[id] = s.status;
    });

    /* detect new sessions */
    const currentIds = new Set(active.map(([id]) => id));

    if (active.length === 0) {
      grid.innerHTML = '';
      emptyState.classList.add('visible');
      knownIds = currentIds;
      return;
    }

    emptyState.classList.remove('visible');

    /* build map of existing DOM cards */
    const existingCards = {};
    grid.querySelectorAll('.session-card').forEach(el => {
      existingCards[el.dataset.sid] = el;
    });

    /* remove gone sessions — play bubble-out then remove from DOM */
    Object.keys(existingCards).forEach(id => {
      if (!currentIds.has(id) && !bubblingOut.has(id)) {
        bubblingOut.add(id);
        const el = existingCards[id];
        el.classList.add('bubble-out');
        setTimeout(() => {
          bubblingOut.delete(id);
          if (el.parentNode) { el.remove(); updateGridLayout(); }
        }, 450);
      }
    });

    /* upsert each session */
    active.forEach(([id, s], idx) => {
      const existing = grid.querySelector(`.session-card[data-sid="${id}"]`);
      const newCard = buildCard(id, s);

      if (existing) {
        /* replace in-place to preserve grid order */
        grid.replaceChild(newCard, existing);
        /* suppress animation for existing cards (don't replay slideIn) */
        if (knownIds.has(id)) {
          newCard.style.animation = 'none';
        }
      } else {
        /* append new card – slideIn animation plays naturally */
        grid.appendChild(newCard);
      }
    });

    /* Re-order DOM to match sorted order (by creation time) */
    active
      .sort(([,a],[,b]) => (a.createdAt || 0) - (b.createdAt || 0))
      .forEach(([id]) => {
        const el = grid.querySelector(`.session-card[data-sid="${id}"]`);
        if (el) grid.appendChild(el); // moves to end preserving order
      });

    knownIds = currentIds;
    updateGridLayout();
  }

  /* ═══════════════════════════════════════════════════════════════
     Firebase listener
  ═══════════════════════════════════════════════════════════════ */
  db.ref('sessions').on('value', snap => {
    const sessions = snap.val() || {};
    renderSessions(sessions);
  });

  /* Re-render every 5 seconds to flip celebration → normal after 60s */
  setInterval(() => {
    db.ref('sessions').once('value', snap => {
      const sessions = snap.val() || {};
      renderSessions(sessions);
    });
  }, 5000);

</script>
</body>
</html>
